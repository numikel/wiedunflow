# MCP Python SDK concept checklist for release-gate eval (US-066).
# Source: modelcontextprotocol/python-sdk v1.10.1 AST inspection + Anthropic Skilljar
# "Building MCP Clients" tutorial coverage list.
#
# Each entry has:
#   id            — machine-readable slug (kebab-case)
#   name          — exact Python symbol name (must match AST in the submodule)
#   category      — transport | session | server | client | protocol | tools |
#                   prompts | resources | sampling | roots | auth
#   weight        — importance (1.0 = must-cover, 0.5 = nice-to-have)
#   expected_lesson_pattern — regex matched against lesson title or teaches field
#
# coverage_target: fraction of weight-1.0 concepts that must appear in generated output.

reference_source: "modelcontextprotocol/python-sdk v1.10.1 + Anthropic Skilljar Building MCP Clients"
coverage_target: 0.70

