# Release-gate eval config for pallets/click (canary repo).
# Overrides: use gpt-5.4-mini/gpt-5.4 (OpenAI, per ADR-0015).
# excludes examples/ and tests/ to prevent FQN pollution in planning stage.
llm:
  provider: "openai"
  model_plan: "gpt-5.4-mini"
  model_narrate: "gpt-5.4"
max_lessons: 30
target_audience: "mid-level Python developer"
exclude_patterns:
  - "examples/**"
  - "tests/**"
