# Release-gate eval config for modelcontextprotocol/python-sdk (primary benchmark).
# Default provider: OpenAI (gpt-5.4 + gpt-5.4-mini) per ADR-0015.
# Anthropic alternative preserved in python-sdk-mcp-anthropic.yaml.
#
# YAML keys must match the flat field names in `WiedunflowConfig` after the
# `llm.*` namespace flattening in `cli/config.py::_load_yaml_flat`.
llm:
  provider: "openai"
  model_plan: "gpt-5.4-mini"
  model_narrate: "gpt-5.4"
  concurrency: 8
# Same lesson count rationale as Anthropic config (curated tour, 10 chapters).
max_lessons: 10
target_audience: "mid-level Python developer"
exclude_patterns:
  - "examples/**"
  - "tests/**"
