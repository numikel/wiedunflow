# Release-gate eval config for modelcontextprotocol/python-sdk (primary benchmark).
# Decision D2: Opus-4-7 for MCP SDK narration to match quality gate rubric.
#
# YAML keys must match the flat field names in `CodeguideConfig` after the
# `llm.*` namespace flattening in `cli/config.py::_load_yaml_flat`. Earlier
# revisions used `narration_model` / `leaf_description_model` and
# `tutorial.max_lessons`, which the parser silently ignored.
llm:
  provider: "anthropic"
  model_plan: "claude-sonnet-4-6"
  model_narrate: "claude-opus-4-7"
  # Reduce Stage 6 fan-out — Tier 1 = 50 RPM hard cap, default concurrency=10
  # is too aggressive when paired with the per-lesson Opus follow-ups.
  concurrency: 4
# MCP SDK is large (187 .py files). On Anthropic Tier 1 (8K OTPM cap on
# Sonnet/Opus), a planning response has to fit in a single 8K-token budget,
# AND each Opus narration call burns ~2K output tokens. 10 lessons keep the
# manifest under the cap and the full Stage 6 sweep under ~10 min wall time.
# Accounts on Tier 2+ can raise this to 15-20.
max_lessons: 10
target_audience: "mid-level Python developer"
