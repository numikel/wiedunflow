# Release-gate eval config for modelcontextprotocol/python-sdk (primary benchmark).
# Decision D2: Opus-4-7 for MCP SDK narration to match quality gate rubric.
llm:
  narration_model: "claude-opus-4-7"
  leaf_description_model: "claude-haiku-4-5"
tutorial:
  # MCP SDK is large (187 .py files); cap lessons at 15 so the planning
  # manifest fits comfortably under the Sonnet output budget and the
  # tutorial reads as a curated tour rather than 30 shallow chapters.
  max_lessons: 15
  target_audience: "mid-level Python developer"
