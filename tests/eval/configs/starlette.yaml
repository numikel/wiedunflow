# Release-gate eval config for encode/starlette.
# Flat layout (starlette/ at root) — no src-path fix needed.
llm:
  provider: "openai"
  model_plan: "gpt-5.4-mini"
  model_narrate: "gpt-5.4"
max_lessons: 30
target_audience: "mid-level Python developer"
exclude_patterns:
  - "tests/**"
  - "scripts/**"
