# Release-gate eval config for dateutil/dateutil.
# Overrides: Sonnet narration for cost-optimised non-MCP eval run.
llm:
  provider: "openai"
  model_plan: "gpt-5.4-mini"
  model_narrate: "gpt-5.4"
  leaf_description_model: "claude-haiku-4-5"
tutorial:
  max_lessons: 5
  target_audience: "junior Python developer"
exclude_patterns:
  - test_*.py
output_path: ./reports/wiedunflow-json-to-markdown.html
