# Release-gate eval config for dateutil/dateutil.
# Flat layout (dateutil/ at root); tests nested inside package as dateutil/test/.
llm:
  provider: "openai"
  model_plan: "gpt-5.4-mini"
  model_narrate: "gpt-5.4"
max_lessons: 30
target_audience: "mid-level Python developer"
exclude_patterns:
  - "dateutil/test/**"
