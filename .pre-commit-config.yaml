repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        additional_dependencies:
          - "click>=8.1.7"
          - "pydantic>=2.7"
          - "pydantic-settings>=2.6.0"
          - "jinja2>=3.1"
          - "pygments>=2.17"
          - "markupsafe>=2.1"
          - "structlog>=24.1"
          - "anthropic>=0.40.0"
          - "openai>=1.50.0"
          - "tenacity>=9.0.0"
          - "platformdirs>=4.3.0"
          - "types-PyYAML"
          - "rich>=13.7"
          - "httpx>=0.27"
          - "tree-sitter>=0.25.0"
          - "tree-sitter-python>=0.25.0"
          - "networkx>=3.3"
          - "numpy>=1.24"
        files: ^src/codeguide/
        args: [--strict]

  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6
    hooks:
      - id: insert-license
        name: insert-license (python)
        files: \.py$
        exclude: ^(docs|tests/eval/corpus)/
        args:
          - --license-filepath=.license-header.txt
          - --no-extra-eol
          - --comment-style=#

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - --strict
          - --force-scope
          - ingestion
          - analysis
          - graph
          - rag
          - planning
          - generation
          - build
          - cli
          - cache
          - config
          - deps
          - release
