# Release Quality Rubric Sign-Off Template — CodeGuide v0.1.0
#
# INSTRUCTIONS:
# 1. Copy this file to signoff-<your-slug>.yaml (e.g. signoff-alice-smith.yaml)
# 2. Replace all placeholders with your actual data
# 3. ALL FIELDS ARE REQUIRED
# 4. Scores must be integers 1–5 (see RUBRIC.md for definitions)
# 5. Rationale for each dimension should be 2–5 sentences, honest, and specific

# Your full name (as it should appear in the release notes)
reviewer: "Jane Doe"

# Your role in this review
# Choose one: "author" (Michał Kamiński only) | "trusted_friend"
reviewer_role: "trusted_friend"

# ISO 8601 date of review (YYYY-MM-DD)
reviewed_at: "2026-04-24"

# Repository being reviewed
# For v0.1.0: always "modelcontextprotocol/python-sdk"
repo: "modelcontextprotocol/python-sdk"

# SHA-256 hash of the generated tutorial.html file
# Obtain via: sha256sum tutorial.html (Linux/macOS) or certutil -hashfile tutorial.html SHA256 (Windows)
tutorial_hash: "sha256:abc123def456..."

# Numeric scores (1–5)
scores:
  # Does the tutorial cover ≥70% of the reference concept list?
  coverage: 3

  # Are all code references grounded and technically correct?
  accuracy: 3

  # Do lessons build logically without re-teaching?
  narrative_flow: 3

# Detailed rationale for each score (mandatory)
rationale:
  coverage: |
    The tutorial covers most core MCP client concepts (protocol, schema, transport)
    but defers advanced patterns (streaming responses, error recovery) to external docs.
    Suitable for a learner who will then read the MCP spec for depth.

  accuracy: |
    All symbol references were checked against the actual SDK codebase.
    One minor: the tutorial refers to `ClientCapabilities` but the SDK calls it
    `ClientMetadata`. Still unambiguous from context.

  narrative_flow: |
    Lessons progress from protocol → client setup → request lifecycle → error handling.
    The ordering feels natural. One minor: async context managers are taught twice
    (once in setup, once in examples) but this reinforcement is acceptable.

# Optional: Any additional feedback (free-form)
comments: |
  The tutorial is genuinely helpful for someone unfamiliar with MCP.
  The code examples are realistic and execute correctly.
  A developer reading this tutorial would be productive within an hour.
  I would recommend shipping at this quality level.
