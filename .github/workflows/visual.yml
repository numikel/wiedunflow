name: Visual Regression

# Sprint 5 plan decision #2 — visual regression is Linux-only. Functional
# browser tests on the full matrix stay in `ci.yml`; this job protects against
# pixel-level drift in the generated tutorial HTML (A1 Paper surfaces, splitter,
# TOC, etc.) against 4 golden baselines in `tests/visual/baselines/linux/`.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "src/wiedunflow/renderer/**"
      - "src/wiedunflow/adapters/jinja_renderer.py"
      - "src/wiedunflow/adapters/pygments_highlighter.py"
      - "src/wiedunflow/entities/lesson*.py"
      - "tests/visual/**"
      - ".github/workflows/visual.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  visual:
    name: Visual regression (Ubuntu)
    runs-on: ubuntu-latest

    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.playwright-browsers
          key: playwright-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: uv run playwright install chromium

      - name: Run visual regression suite
        run: uv run pytest tests/visual/ -v

      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff-${{ github.run_id }}
          path: |
            tests/visual/baselines/
            tests/visual/__diffs__/
          if-no-files-found: warn
          retention-days: 7
