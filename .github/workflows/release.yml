# Release gate workflow (US-067)
#
# Triggered ONLY on semantic-version tags (v*.*.*) or manual dispatch.
# It does NOT run on every push — CI coverage is handled by ci.yml.
#
# Jobs (in order):
#   pip-audit        — run pip-audit against OSV; block on HIGH+ (no-fix) vulns.
#   notice-check     — hard gate: NOTICE must match aggregate_notice.py output.
#   build-artifacts  — uv build sdist+wheel; upload as GH artifact.
#   create-release   — create GitHub Release with dist/* assets (tag-only).
#
# Note: jq is pre-installed on ubuntu-latest GitHub Actions runners.

name: Release gate

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    name: pip-audit (OSV)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install project + dev dependencies
        run: uv sync --all-extras --dev

      - name: Export runtime requirements (no dev, no hashes)
        run: uv export --format requirements-txt --no-dev --no-hashes > requirements.txt

      - name: Run pip-audit against OSV (JSON output)
        id: audit
        # continue-on-error so the next step can parse results and decide severity.
        continue-on-error: true
        run: |
          uv run pip-audit \
            --requirement requirements.txt \
            --vulnerability-service osv \
            --format json \
            --output audit.json

      - name: Analyse severity and enforce HIGH+ gate
        # Block the release if any vulnerability has NO fix version available.
        # Vulnerabilities WITH a fix available are LOW/MEDIUM — surfaced but
        # do not block (teams can schedule a patch upgrade separately).
        run: |
          if [ -f audit.json ]; then
            FIXABLE=$(jq '[.dependencies[].vulns[] | select(.fix_versions != [])] | length' audit.json 2>/dev/null || echo 0)
            NO_FIX=$(jq '[.dependencies[].vulns[] | select(.fix_versions == [])] | length' audit.json 2>/dev/null || echo 0)
            echo "Vulnerabilities with a fix (LOW/MEDIUM): $FIXABLE"
            echo "Vulnerabilities without a fix (HIGH+):   $NO_FIX"
            if [ "$NO_FIX" -gt 0 ]; then
              echo "::error::HIGH+ vulnerability detected (no fix available) — blocking release"
              exit 1
            fi
            if [ "$FIXABLE" -gt 0 ]; then
              echo "::warning::$FIXABLE fixable vulnerabilities found — schedule upgrade"
            fi
            echo "pip-audit: no blocking vulnerabilities found"
          else
            echo "audit.json not produced (pip-audit found no vulnerabilities)"
          fi

  notice-check:
    name: NOTICE aggregation check (hard gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Hard gate per US-062 AC: the release is blocked if the committed NOTICE
    # does not match what aggregate_notice.py --write would produce.
    # Regenerate locally with: uv sync --no-dev && uv run python scripts/aggregate_notice.py --write

    steps:
      - uses: actions/checkout@v6

      - name: Install uv (no cache for deterministic venv)
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Install runtime dependencies only
        # NOTICE aggregates Apache-2.0 *runtime* deps only — installing dev
        # extras would surface pytest/ruff/pip-audit NOTICE requirements that
        # are not shipped with end-user wheels.
        run: uv sync --no-dev

      - name: Verify NOTICE is up to date (hard gate)
        # Exits 1 if the committed NOTICE differs from what the script would
        # generate. Fix locally: uv sync --no-dev && uv run python scripts/aggregate_notice.py --write
        run: uv run python scripts/aggregate_notice.py --check --output NOTICE

  build-artifacts:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [pip-audit, notice-check]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"

      - name: Install runtime dependencies only
        run: uv sync --no-dev

      - name: Build sdist and wheel
        run: uv build

      - name: Verify dist artifacts exist
        run: ls -lh dist/

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-dist
          path: dist/
          retention-days: 90

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-artifacts]
    # Only create a release when this workflow was triggered by a version tag.
    # workflow_dispatch without a tag will build artifacts but skip this job.
    if: github.ref_type == 'tag'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-dist
          path: dist/

      - name: Render release notes template
        # softprops/action-gh-release does NOT expand `${{ ... }}` expressions
        # inside body_path file content — it streams the file verbatim. We
        # substitute placeholders with shell-safe ${RELEASE_TAG} / ${RELEASE_VERSION}
        # via envsubst so the rendered notes carry the actual tag and wheel name.
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          # Strip leading `v` from the tag to derive the wheel version (v0.9.2 -> 0.9.2)
          export RELEASE_VERSION="${RELEASE_TAG#v}"
          envsubst '${RELEASE_TAG} ${RELEASE_VERSION}' \
            < .github/release-notes-template.md \
            > .github/release-notes-rendered.md
          echo "--- rendered notes ---"
          cat .github/release-notes-rendered.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          generate_release_notes: true
          body_path: .github/release-notes-rendered.md
