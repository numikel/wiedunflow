# Release gate workflow (US-067)
#
# Triggered ONLY on semantic-version tags (v*.*.*) or manual dispatch.
# It does NOT run on every push — CI coverage is handled by ci.yml.
#
# Jobs (in order):
#   pip-audit        — run pip-audit against OSV; block on HIGH+ (no-fix) vulns.
#   notice-check     — hard gate: NOTICE must match aggregate_notice.py output.
#   build-artifacts  — uv build sdist+wheel; upload as GH artifact.
#   create-release   — create GitHub Release with dist/* assets (tag-only).
#
# Note: jq is pre-installed on ubuntu-latest GitHub Actions runners.

name: Release gate

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    name: pip-audit (OSV)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install project + dev dependencies
        run: uv sync --all-extras --dev

      - name: Export runtime requirements (no dev, no hashes)
        run: uv export --format requirements-txt --no-dev --no-hashes > requirements.txt

      - name: Run pip-audit against OSV (JSON output)
        id: audit
        # continue-on-error so the next step can parse results and decide severity.
        #
        # --ignore-vuln allowlist — every entry MUST come with a written
        # justification in docs/security/vulnerability-allowlist.md.
        # That document is the audit trail (re-check cadence, removal
        # procedure when an upstream fix lands, per-entry justification
        # with file/function trace). Do NOT add an entry here without
        # also adding the matching row there.
        #
        # GHSA-58cw-g322-p94v — mistune Figure directive XSS (no fix
        #   upstream as of 2026-05-17). Not applicable: our renderer
        #   passes `plugins=None`. Full justification + re-check
        #   checklist: docs/security/vulnerability-allowlist.md.
        # GHSA-8g87-j6q8-g93x — mistune Math plugin XSS escape bypass
        #   (no fix upstream as of 2026-05-17). Not applicable: same
        #   reason (plugins=None). Full justification: same doc.
        continue-on-error: true
        run: |
          uv run pip-audit \
            --requirement requirements.txt \
            --vulnerability-service osv \
            --format json \
            --output audit.json \
            --ignore-vuln GHSA-58cw-g322-p94v \
            --ignore-vuln GHSA-8g87-j6q8-g93x

      - name: Analyse audit results and enforce no-fix gate
        # The release is blocked when pip-audit reports any vulnerability
        # without an upstream fix version, AFTER applying the per-vuln
        # allowlist above (each allowlisted ID must carry a written
        # not-applicable justification). Vulnerabilities WITH a fix
        # available are surfaced as a workflow warning so the team can
        # schedule the upgrade in the next release.
        #
        # Note: this gate is about "is there a fix we are not taking" —
        # not raw CVSS severity. A HIGH-severity vuln with a fix is
        # surfaced as fixable; a LOW-severity vuln with no fix is
        # surfaced as no-fix (and either allowlisted with a reason or
        # blocking the release).
        run: |
          if [ -f audit.json ]; then
            FIXABLE=$(jq '[.dependencies[].vulns[] | select(.fix_versions != [])] | length' audit.json 2>/dev/null || echo 0)
            NO_FIX=$(jq '[.dependencies[].vulns[] | select(.fix_versions == [])] | length' audit.json 2>/dev/null || echo 0)
            echo "Vulnerabilities with an upstream fix: $FIXABLE"
            echo "Vulnerabilities without a fix:        $NO_FIX"
            if [ "$NO_FIX" -gt 0 ]; then
              echo "::error::Unallowlisted vulnerability with no upstream fix — blocking release. Either upgrade away, allowlist with a not-applicable justification in release.yml, or accept the risk in a dedicated ADR."
              jq '[.dependencies[] | select(.vulns != []) | {name, version, vulns: [.vulns[] | select(.fix_versions == []) | {id, summary: (.summary // ""), aliases: (.aliases // [])}]}] | map(select(.vulns | length > 0))' audit.json
              exit 1
            fi
            if [ "$FIXABLE" -gt 0 ]; then
              echo "::warning::$FIXABLE fixable vulnerabilities found — schedule upgrade"
              jq '[.dependencies[] | select(.vulns != []) | {name, version, vulns: [.vulns[] | select(.fix_versions != []) | {id, fix_versions}]}] | map(select(.vulns | length > 0))' audit.json
            fi
            echo "pip-audit: no blocking vulnerabilities found"
          else
            echo "audit.json not produced (pip-audit found no vulnerabilities)"
          fi

      - name: Upload audit.json as artifact
        # Always upload — even on success — so a release reviewer can
        # inspect what was scanned and which vulns were allowlisted.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-osv-report
          path: audit.json
          if-no-files-found: ignore

  notice-check:
    name: NOTICE aggregation check (hard gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Hard gate per US-062 AC: the release is blocked if the committed NOTICE
    # does not match what aggregate_notice.py --write would produce.
    # Regenerate locally with: uv sync --no-dev && uv run python scripts/aggregate_notice.py --write

    steps:
      - uses: actions/checkout@v6

      - name: Install uv (no cache for deterministic venv)
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Install runtime dependencies only
        # NOTICE aggregates Apache-2.0 *runtime* deps only — installing dev
        # extras would surface pytest/ruff/pip-audit NOTICE requirements that
        # are not shipped with end-user wheels.
        run: uv sync --no-dev

      - name: Verify NOTICE is up to date (hard gate)
        # Exits 1 if the committed NOTICE differs from what the script would
        # generate. Fix locally: uv sync --no-dev && uv run python scripts/aggregate_notice.py --write
        run: uv run python scripts/aggregate_notice.py --check --output NOTICE

  build-artifacts:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [pip-audit, notice-check]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"

      - name: Install runtime dependencies only
        run: uv sync --no-dev

      - name: Build sdist and wheel
        run: uv build

      - name: Verify dist artifacts exist
        run: ls -lh dist/

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-dist
          path: dist/
          retention-days: 90

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-artifacts]
    # Only create a release when this workflow was triggered by a version tag.
    # workflow_dispatch without a tag will build artifacts but skip this job.
    if: github.ref_type == 'tag'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-dist
          path: dist/

      - name: Render release notes template
        # softprops/action-gh-release does NOT expand `${{ ... }}` expressions
        # inside body_path file content — it streams the file verbatim. We
        # substitute placeholders with shell-safe ${RELEASE_TAG} / ${RELEASE_VERSION}
        # via envsubst so the rendered notes carry the actual tag and wheel name.
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          # Strip leading `v` from the tag to derive the wheel version (v0.9.2 -> 0.9.2)
          export RELEASE_VERSION="${RELEASE_TAG#v}"
          envsubst '${RELEASE_TAG} ${RELEASE_VERSION}' \
            < .github/release-notes-template.md \
            > .github/release-notes-rendered.md
          echo "--- rendered notes ---"
          cat .github/release-notes-rendered.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          generate_release_notes: true
          body_path: .github/release-notes-rendered.md
